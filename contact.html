<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="assets/js/contact-script.js" defer></script>
    <title>Matthew Bassett's Portfolio</title>
</head>

<body class="min-h-screen flex flex-col">
    <header class="sticky top-0 z-50 flex items-center justify-center px-6 py-4 bg-[rgb(188,201,208)] border-2 border-black">
        <h1 class="gap-3 text-xl font-bold">Contact Us</h1>

        <nav class="absolute left-6">
            <a class="hover:underline transition" href="home-page.html">Home</a>
        </nav>
        <nav class="absolute right-6">
            <a class="hover:underline transition" href="about.html">About</a>
        </nav>
    </header>

    <main class="flex-grow grid gap-6 px-6 py-4 max-w-5xl mx-auto px-4">
        <form id="contact-form">
            <article class="border-2 border-black bg-gray-200">
                <header class="flex justify-between items-center p-4 bg-gray-300">
                    <h2 class="font-bold">Contact Information</h2>
                </header>

                <section class="p-4">
                    <label for="name">Name</label>
                    <input id="name" class="w-full p-2 border border-black bg-white mb-2" type="text" placeholder="Please Enter Name">

                    <label for="email">Email</label>
                    <input id="email" class="w-full p-2 border border-black bg-white mb-2" type="email" placeholder="Please Enter Email">

                    <label for="message">Message</label>
                    <textarea id="message" class="w-full p-2 border border-black bg-white mb-2" placeholder="Please Enter Message"></textarea>

                    <button class="border border-black bg-white px-3 py-1 hover:bg-gray-100" type="submit">
                        Send
                    </button>

                    <p id="error-message" class="text-red-600 mt-2"></p>
                </section>
            </article>
        </form>
    </main>

    <footer class="border-2 border-black bg-[rgb(188,201,208)] px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <p class="text-center md:text-left">&copy; Copyright 2026 Matthew Bassett</p>
        <ul class="flex gap-6 list-none">
            <a href="about.html">About</a>
        </ul>
    </footer>
</body>
</html>
